<header class="app-header">
  <div class="header-left">
    <a routerLink="/main" class="logo-link" aria-label="RCM Home">
      <div class="logo-icon">
        <i class="pi pi-box"></i>
      </div>
      <span class="logo-text">RCM</span>
    </a>

    <nav class="nav-tabs" aria-label="Main navigation">
      @for (item of navItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="active"
          class="nav-tab"
          [attr.aria-current]="undefined"
        >
          {{ item.label }}
        </a>
      }
    </nav>
  </div>

  <div class="header-right">
    <app-search-bar />

    <button
      class="icon-button"
      (click)="themeService.toggleTheme()"
      [title]="themeService.theme() === 'light' ? 'Switch to Dark Mode' : 'Switch to Light Mode'"
      aria-label="Toggle theme"
    >
      @if (themeService.theme() === 'light') {
        <i class="pi pi-moon"></i>
      } @else {
        <i class="pi pi-sun"></i>
      }
    </button>

    <button class="icon-button notification-button" aria-label="Notifications">
      <i class="pi pi-bell" pBadge value="3" severity="danger"></i>
    </button>

    <button class="avatar-button" (click)="logout()" aria-label="User menu">
      <app-user-avatar name="John Doe" size="normal" />
    </button>
  </div>
</header>
