<div
  class="fixed inset-0 z-50 flex overflow-hidden"
  [class.justify-end]="position === 'right'"
  [class.justify-start]="position === 'left'"
  (click)="onBackdropClick($event)"
>
  <div
    class="relative h-full bg-white dark:bg-zinc-900 text-gray-900 dark:text-gray-100 shadow-xl border-l border-gray-200 dark:border-zinc-800 pointer-events-auto flex flex-col"
    [class]="sizeClass"
    role="dialog"
    aria-modal="true"
  >
    <div class="relative flex-1 h-full overflow-auto p-4">
      <ng-template cdkPortalOutlet></ng-template>
    </div>
  </div>
</div>
