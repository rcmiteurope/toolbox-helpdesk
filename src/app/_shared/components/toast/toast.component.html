<div
  class="flex items-start p-4 mb-4 rounded-lg shadow-lg border-l-4 transition-all duration-300 pointer-events-auto"
  [class]="typeClasses[toast().type]"
  role="alert"
>
  <div class="flex-shrink-0 mr-3 mt-0.5">
    @switch (toast().type) {
      @case ('success') {
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M5 13l4 4L19 7"
          ></path>
        </svg>
      }
      @case ('error') {
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          ></path>
        </svg>
      }
      @case ('warning') {
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
          ></path>
        </svg>
      }
      @default {
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          ></path>
        </svg>
      }
    }
  </div>
  <div class="flex-1 mr-4">
    @if (toast().title) {
      <h3 class="text-sm font-bold mb-1">{{ toast().title }}</h3>
    }
    <p class="text-sm opacity-90 leading-tight">{{ toast().message }}</p>
  </div>
  <button
    (click)="close.emit(toast().id)"
    class="flex-shrink-0 -mt-1 -mr-1 p-1 rounded-md transition-colors hover:bg-black/10 focus:outline-none"
  >
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M6 18L18 6M6 6l12 12"
      ></path>
    </svg>
  </button>
</div>
